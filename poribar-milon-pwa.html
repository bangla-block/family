<html lang="bn">
<head>
<meta charset="UTF-8"/>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600;700;800&family=Noto+Serif+Bengali:wght@700;800&display=swap" rel="stylesheet"/>
<style>
:root{--saffron:#E8873A;--saffron-dk:#C4612A;--saffron-lt:#FDF0E4;--forest:#2D6A4F;--forest-bg:#E8F5EF;--cream:#FDF8F2;--deep:#1B2340;--deep2:#252E4B;--gold:#E9A320;--gold-bg:#FEF9EC;--rose:#C94060;--rose-bg:#FCE8ED;--sky:#0369A1;--sky-bg:#E0F2FE;--purple:#6D28D9;--purple-bg:#EDE9FE;--text:#1E1E2E;--muted:#6B7280;--border:#EAE2D8;--sb:env(safe-area-inset-bottom,0px);--nav-h:64px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{font-size:15px;-webkit-text-size-adjust:100%;}
body{font-family:'Noto Sans Bengali',sans-serif;background:var(--cream);color:var(--text);overscroll-behavior:none;}
h1,h2,h3,h4{font-family:'Noto Serif Bengali',serif;}
button,select,input,textarea{font-family:'Noto Sans Bengali',sans-serif;}
a{text-decoration:none;color:inherit;}
.app{max-width:480px;margin:0 auto;background:#fff;min-height:100vh;position:relative;}
.auth-wrap{min-height:100vh;background:var(--deep);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;}
.auth-logo{font-size:3.2rem;margin-bottom:12px;}
.auth-title{font-family:'Noto Serif Bengali',serif;font-size:1.45rem;font-weight:800;color:#fff;text-align:center;margin-bottom:4px;}
.auth-sub{font-size:.78rem;color:rgba(255,255,255,.45);text-align:center;margin-bottom:26px;}
.auth-card{background:#fff;border-radius:20px;padding:22px 18px;width:100%;max-width:390px;box-shadow:0 8px 40px rgba(0,0,0,.35);}
.auth-tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:18px;}
.auth-tab{flex:1;padding:10px;text-align:center;font-size:.88rem;font-weight:700;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;background:none;border-top:none;border-left:none;border-right:none;font-family:'Noto Sans Bengali',sans-serif;}
.auth-tab.on{color:var(--saffron);border-bottom-color:var(--saffron);}
.err-box{background:var(--rose-bg);border:1px solid #F9A8BE;border-radius:8px;padding:10px 12px;font-size:.78rem;color:var(--rose);margin-bottom:12px;}
.lock-hint{background:var(--gold-bg);border:1px solid #FDE68A;border-radius:10px;padding:11px 13px;font-size:.8rem;color:#92400E;margin-bottom:14px;display:flex;align-items:flex-start;gap:8px;}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:12px;color:var(--muted);}
.spin{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--saffron);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.topbar{position:sticky;top:0;z-index:90;background:var(--deep);padding:13px 16px 11px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(0,0,0,.25);}
.topbar-title{font-size:1.04rem;font-weight:800;color:#fff;font-family:'Noto Serif Bengali',serif;}
.topbar-sub{font-size:.66rem;color:rgba(255,255,255,.45);margin-top:1px;}
.topbar-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.95rem;font-weight:800;color:#fff;flex-shrink:0;border:2px solid rgba(255,255,255,.25);}
.topbar-user{display:flex;align-items:center;gap:8px;cursor:pointer;}
.topbar-uname{font-size:.74rem;color:rgba(255,255,255,.75);font-weight:700;}
.nb{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(5,1fr);z-index:100;padding-bottom:var(--sb);box-shadow:0 -4px 20px rgba(0,0,0,.08);}
.nb-i{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 8px;cursor:pointer;border:none;background:transparent;min-height:var(--nav-h);gap:3px;color:var(--muted);}
.nb-i.on{color:var(--saffron);}
.nb-icon{font-size:1.4rem;line-height:1;}
.nb-lbl{font-size:.6rem;font-weight:700;white-space:nowrap;}
.page{padding:0 0 calc(var(--nav-h) + var(--sb) + 8px);}
.pi{padding:14px;}
.notice-bar{background:linear-gradient(135deg,#6D28D9,#4C1D95);color:#fff;padding:11px 16px;display:flex;align-items:flex-start;gap:10px;font-size:.84rem;line-height:1.5;}
.notice-bar-x{font-size:1rem;cursor:pointer;opacity:.7;margin-left:auto;flex-shrink:0;}
.hero{background:linear-gradient(135deg,var(--deep) 0%,#2D3561 100%);border-radius:16px;padding:20px 18px;margin-bottom:14px;position:relative;overflow:hidden;}
.hero::before{content:'🌙';position:absolute;right:-8px;top:-14px;font-size:6rem;opacity:.07;}
.hero h2{font-size:1.12rem;color:#fff;margin-bottom:4px;line-height:1.4;}
.hero p{font-size:.75rem;color:rgba(255,255,255,.5);line-height:1.5;}
.hs-row{display:flex;margin-top:14px;border-top:1px solid rgba(255,255,255,.1);padding-top:12px;}
.hs{flex:1;text-align:center;border-right:1px solid rgba(255,255,255,.1);}
.hs:last-child{border-right:none;}
.hs-val{font-family:'Noto Serif Bengali',serif;font-size:1.28rem;font-weight:800;color:var(--gold);}
.hs-lbl{font-size:.6rem;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.06em;margin-top:1px;}
.sr2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}

.chip-val{font-family:'Noto Serif Bengali',serif;font-size:1.38rem;font-weight:800;line-height:1.1;}

.qcs{background:var(--deep2);border-radius:12px;padding:13px 14px;margin-top:14px;}

.qc-name{font-size:.84rem;font-weight:800;color:#fff;}

.donor-info{flex:1;min-width:0;}
.donor-name{font-weight:800;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.donor-sub{font-size:.7rem;color:var(--muted);margin-top:1px;}
.donor-amt{font-family:'Noto Serif Bengali',serif;font-size:1rem;font-weight:800;color:var(--saffron-dk);}
.pay-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:13px;margin-bottom:10px;display:flex;align-items:flex-start;gap:11px;}
.pay-card.dim{opacity:.62;border-style:dashed;}
.pay-info{flex:1;min-width:0;}
.pay-name{font-weight:800;font-size:.92rem;}
.pay-tags{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;}
.ptag{font-size:.7rem;font-weight:800;padding:3px 8px;border-radius:6px;}
.ptag-e{background:var(--forest-bg);color:var(--forest);}.ptag-d{background:var(--gold-bg);color:#92400E;}.ptag-t{background:var(--saffron-lt);color:var(--saffron-dk);}
.pay-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.sbadge{font-size:.65rem;font-weight:800;padding:3px 8px;border-radius:6px;text-transform:uppercase;}
.sb-paid{background:#DCFCE7;color:#15803D;}.sb-unpaid{background:#FEE2E2;color:#B91C1C;}.sb-partial{background:#FEF9C3;color:#A16207;}
.tag{display:inline-flex;font-size:.65rem;font-weight:800;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em;}
.tag-a{background:var(--purple-bg);color:var(--purple);}.tag-t{background:#FFF7ED;color:#C2410C;border:1px solid #FED7AA;}.tag-c{background:var(--rose-bg);color:var(--rose);}.tag-m{background:var(--sky-bg);color:var(--sky);}
.rp{display:inline-block;font-size:.6rem;font-weight:800;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em;}
.rp-sa{background:#E8873A22;color:var(--saffron);border:1px solid var(--saffron);}.rp-m{background:#40916C22;color:var(--forest);border:1px solid var(--forest);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 18px;border-radius:10px;font-family:'Noto Sans Bengali',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;border:none;min-height:44px;}
.btn-p{background:var(--saffron);color:#fff;}.btn-f{background:var(--forest);color:#fff;}.btn-s{background:#fff;border:1.5px solid var(--border);color:var(--text);}.btn-d{background:var(--rose-bg);color:var(--rose);border:1px solid #F9A8BE;}.btn-g{background:transparent;color:var(--muted);}.btn-pu{background:var(--purple);color:#fff;}.btn-dk{background:var(--deep);color:#fff;}
.btn-sm{padding:7px 12px;font-size:.78rem;min-height:36px;border-radius:8px;}.btn-xs{padding:4px 9px;font-size:.7rem;min-height:30px;border-radius:6px;}.btn-w{width:100%;}
.fab{position:fixed;right:16px;bottom:calc(var(--nav-h) + var(--sb) + 14px);width:52px;height:52px;border-radius:50%;background:var(--saffron);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.5rem;box-shadow:0 4px 16px rgba(232,135,58,.45);cursor:pointer;z-index:80;border:none;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:110;}
.sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-radius:20px 20px 0 0;z-index:120;padding:20px 16px calc(var(--nav-h) + var(--sb) + 14px);max-height:88vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.2);}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;}
.modal-sh{background:#fff;border-radius:20px 20px 0 0;padding:20px 16px calc(var(--sb) + 20px);width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.2);}
.mhandle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
.mtitle{font-size:1.08rem;font-weight:800;margin-bottom:16px;text-align:center;}
.mact{display:flex;gap:10px;margin-top:18px;}
.mact .btn{flex:1;}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:.72rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}
.fc{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:'Noto Sans Bengali',sans-serif;font-size:.9rem;outline:none;background:#fff;min-height:44px;}
.fc:focus{border-color:var(--saffron);}
textarea.fc{resize:vertical;min-height:80px;}
.fcnote{font-size:.7rem;color:var(--muted);margin-top:4px;}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.notice{background:var(--gold-bg);border:1px solid #FDE68A;border-radius:10px;padding:11px 13px;font-size:.8rem;color:#92400E;margin-bottom:14px;line-height:1.5;}
.info{background:var(--sky-bg);border:1px solid #BAE6FD;border-radius:10px;padding:11px 13px;font-size:.8rem;color:#0C4A6E;margin-bottom:14px;line-height:1.5;}
.st{font-size:.95rem;font-weight:800;margin:18px 0 10px;color:var(--text);font-family:'Noto Serif Bengali',serif;}
.sh-row{display:flex;align-items:center;justify-content:space-between;margin:16px 0 10px;}
.sh-row .st{margin:0;}
.tab-row{display:flex;border-bottom:2px solid var(--border);margin-bottom:14px;}
.tab-btn{padding:10px 16px;font-size:.83rem;font-weight:700;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;background:none;border-top:none;border-left:none;border-right:none;font-family:'Noto Sans Bengali',sans-serif;}
.tab-btn.on{color:var(--saffron);border-bottom-color:var(--saffron);}
.card{background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.tl-day{display:flex;}.tl-m{display:flex;flex-direction:column;align-items:center;width:52px;flex-shrink:0;}
.tl-dot{width:34px;height:34px;border-radius:50%;background:var(--saffron);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:.78rem;flex-shrink:0;}
.tl-line{width:2px;flex:1;background:var(--border);margin:4px 0;}
.tl-body{flex:1;padding-bottom:20px;padding-top:4px;}
.tl-date{font-size:.7rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:7px;}
.tl-item{background:#fff;border:1px solid var(--border);border-radius:10px;padding:11px 12px;margin-bottom:8px;position:relative;}
.tl-item h4{font-size:.88rem;font-weight:800;margin-bottom:3px;}
.tl-item p{font-size:.78rem;color:var(--muted);line-height:1.5;}
.tl-time{display:inline-block;background:var(--saffron);color:#fff;font-size:.66rem;font-weight:800;padding:2px 7px;border-radius:4px;margin-bottom:5px;}
.ia{display:flex;gap:4px;position:absolute;top:8px;right:8px;}
.food-dc{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px;}
.food-dh{background:var(--deep);color:#fff;padding:11px 14px;}
.food-dh h3{font-size:.9rem;}
.food-ms{padding:12px 14px;border-bottom:1px solid var(--border);}
.food-ms:last-child{border-bottom:none;}
.fml{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.fm-am{color:#F97316;}.fm-no{color:var(--forest);}.fm-ni{color:var(--purple);}
.fmi{font-size:.83rem;padding:5px 0;border-bottom:1px dashed var(--border);display:flex;align-items:center;justify-content:space-between;gap:6px;}
.fmi:last-child{border-bottom:none;}
.sleep-c{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px;}
.sleep-h{padding:12px 14px;border-bottom:1px solid var(--border);}
.sleep-h h3{font-size:.9rem;font-weight:800;}
.sleep-slots{padding:10px 14px;display:flex;flex-direction:column;gap:6px;}
.sl{display:flex;align-items:center;justify-content:space-between;padding:9px 11px;border-radius:8px;font-size:.82rem;}
.sl.occ{background:#FEE2E2;}.sl.avail{background:#DCFCE7;}
.sl-name{font-weight:700;}
.sl.occ .sl-st{color:var(--rose);font-size:.64rem;font-weight:800;text-transform:uppercase;}
.sl.avail .sl-st{color:var(--forest);font-size:.64rem;font-weight:800;text-transform:uppercase;}
.smc{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;}
.smc-top{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.smc-bar{height:5px;border-radius:3px;background:#F5EEE6;margin-bottom:8px;overflow:hidden;}
.smc-fill{height:100%;border-radius:3px;background:var(--rose);}
.smc-nums{display:flex;justify-content:space-between;font-size:.74rem;margin-bottom:6px;}
.scat{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px;}
.scat-hd{padding:12px 14px;background:#FAFAF8;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.scat-hd h3{font-size:.9rem;font-weight:800;}.scat-hd p{font-size:.7rem;color:var(--muted);margin-top:2px;}
.scat-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid #F5EEE6;font-size:.84rem;}
.scat-item:last-child{border-bottom:none;}
.scat-foot{padding:10px 14px;background:#FAFAF8;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:.82rem;font-weight:800;}
.amt{font-weight:800;font-family:'Noto Serif Bengali',serif;}
.ag{color:var(--forest);}.ar{color:var(--rose);}.ao{color:var(--saffron-dk);}.ask{color:var(--sky);}
.cc{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;}
.cc-top{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.cc-name{font-weight:800;font-size:.95rem;}
.vol-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:13px 14px;display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.mc{background:#fff;border:1px solid var(--border);border-radius:12px;padding:13px 14px;display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.mc-info{flex:1;min-width:0;}
.mc-name{font-weight:800;font-size:.9rem;}
.perm-c{background:#fff;border:1px solid var(--border);border-radius:12px;padding:13px 14px;margin-bottom:8px;}
.pmods{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}

.pmb{background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:14px;}
.srow{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:.86rem;}
.srow:last-child{border-bottom:none;font-weight:800;font-size:.94rem;}
.pwrow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.pwrow:last-child{border-bottom:none;}
.mra-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0;}
.mra{border-radius:10px;padding:14px;}
.mra-lbl{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.mra-val{font-family:'Noto Serif Bengali',serif;font-size:1.6rem;font-weight:800;}

.ei{font-size:2.8rem;margin-bottom:8px;}
.locked{display:flex;align-items:center;justify-content:center;min-height:280px;flex-direction:column;gap:10px;color:var(--muted);font-size:.9rem;}
.cbox{background:var(--saffron-lt);border:1.5px solid var(--saffron);border-radius:12px;padding:14px;margin-bottom:14px;}
.cbox h4{color:var(--saffron-dk);margin-bottom:10px;font-size:.94rem;}
.crow{display:flex;justify-content:space-between;font-size:.86rem;padding:5px 0;border-bottom:1px dashed #E8C4A0;}

.age-opt-icon{font-size:1.3rem;margin-bottom:3px;}
.age-opt-lbl{font-size:.8rem;font-weight:800;}
.age-opt-sub{font-size:.65rem;color:var(--muted);margin-top:2px;}
.age-opt-fee{font-size:.68rem;font-weight:800;margin-top:5px;}

// ── RAW TABLE CACHE (filled once, patched by Realtime) ────────────────────────
let RAW = {
  members:[], payments:[], spending_categories:[], spending_items:[],
  event_days:[], event_items:[], food_days:[], food_items:[],
  rooms:[], room_slots:[], volunteers:[], module_moderators:[], app_settings:[]
};
let RT_STATUS = "connecting"; // "connecting" | "live" | "error"

// Table fetch config: order field for each table
const TABLE_ORDER = {
  members:"id", payments:"id", spending_categories:"id", spending_items:"id",
  event_days:"sort_order", event_items:"sort_order",
  food_days:"sort_order", food_items:"sort_order",
  rooms:"id", room_slots:"slot_number", volunteers:"id",
  module_moderators:"id", app_settings:null
};

// Fetch a single table and update RAW
async function fetchTable(table) {
  let q = sb.from(table).select("*");
  if (TABLE_ORDER[table]) q = q.order(TABLE_ORDER[table]);
  const {data} = await q;
  RAW[table] = data || [];
}

// Unique key for a row (handles composite PKs)
function rowKey(table, row) {
  if (!row) return null;
  if (table === "app_settings") return row.key;
  if (table === "room_slots") return `${row.room_id}_${row.slot_number}`;
  return row.id;
}

// Patch RAW with a single Realtime event (zero network calls)
function applyChange(table, eventType, newRow, oldRow) {
  const arr = RAW[table];
  if (eventType === "INSERT") {
    // avoid duplicates
    const k = rowKey(table, newRow);
    if (!arr.some(r => rowKey(table,r)===k)) arr.push(newRow);
  } else if (eventType === "UPDATE") {
    const k = rowKey(table, newRow);
    const i = arr.findIndex(r => rowKey(table,r)===k);
    if (i >= 0) arr[i] = newRow; else arr.push(newRow);
  } else if (eventType === "DELETE") {
    const k = rowKey(table, oldRow);
    const i = arr.findIndex(r => rowKey(table,r)===k);
    if (i >= 0) arr.splice(i, 1);
  }
}

// ── BUILD S.DATA FROM RAW — pure transformation, zero network ─────────────────
function buildData() {
  const members=RAW.members, pays=RAW.payments,
    spdCats=RAW.spending_categories, spdItems=RAW.spending_items,
    evtDays=RAW.event_days, evtItems=RAW.event_items,
    foodDays=RAW.food_days, foodItems=RAW.food_items,
    rooms=RAW.rooms, roomSlots=RAW.room_slots,
    vols=RAW.volunteers, modMods=RAW.module_moderators,
    settings=RAW.app_settings;
  const users = members.map(m=>({id:m.id,name:m.name,phone:m.phone,type:m.type,role:m.role,noPhone:m.no_phone,guardianId:m.guardian_id,note:m.note||"",password:m.password||""}));
  const payments = pays.map(p=>({id:p.id,userId:p.member_id,entryFee:p.entry_fee,donation:p.donation,channel:p.channel,date:new Date(p.created_at).toLocaleDateString("bn-BD"),note:p.note||""}));
  const spending = spdCats.map(c=>({id:c.id,category:c.category,moderatorId:c.moderator_id,received:c.received,handoversBack:c.handovers_back,items:spdItems.filter(i=>i.category_id===c.id).map(i=>({id:i.id,name:i.name,amount:i.amount}))}));
  const events = evtDays.map(d=>({id:d.id,date:d.date,day:d.day_label,items:evtItems.filter(i=>i.event_day_id===d.id).map(i=>({id:i.id,time:i.time_label,title:i.title,desc:i.description}))}));
  const food = foodDays.map(d=>{const di=foodItems.filter(i=>i.food_day_id===d.id);return{id:d.id,date:d.date,day:d.day_label,morning:di.filter(i=>i.meal==="morning"),noon:di.filter(i=>i.meal==="noon"),night:di.filter(i=>i.meal==="night")};});
  const roomsData = rooms.map(r=>({id:r.id,name:r.name,capacity:r.capacity,beds:r.beds,slots:roomSlots.filter(s=>s.room_id===r.id).map(s=>({id:s.slot_number,occupantId:s.occupant_id,status:s.occupant_id?"occ":"avail"}))}));
  const volunteers = vols.map(v=>({id:v.id,userId:v.member_id}));
  const mods = {fund:[],spending:[],events:[],food:[],sleep:[],contact:[],volunteer:[]};
  modMods.forEach(m=>{if(mods[m.module])mods[m.module].push(m.member_id);});
  const notice = settings.find(s=>s.key==="notice")?.value||"";
  const modBudgets = {};
  settings.forEach(s=>{const m=s.key.match(/^mod_budget_(\d+)$/);if(m)modBudgets[Number(m[1])]=Number(s.value)||0;});
  return {users,payments,spending,events,food,rooms:roomsData,volunteers,mods,notice,modBudgets};
}

// ── TARGETED RELOAD — only re-fetches the tables that changed ─────────────────
async function reloadTables(...tables) {
  await Promise.all(tables.map(t => fetchTable(t)));
  S.data = buildData();
  S.loading = false;
  mount();
}

// Full reload (used only on initial load)
async function reload() {
  S.loading = true; mount();
  await Promise.all(Object.keys(RAW).map(t => fetchTable(t)));
  S.data = buildData();
  S.loading = false; mount();
}

// ── REALTIME SUBSCRIPTIONS ────────────────────────────────────────────────────
function setupRealtime() {
  const tables = Object.keys(RAW);
  let subCount = 0;
  tables.forEach(table => {
    sb.channel(`rt_${table}`)
      .on("postgres_changes", {event:"*", schema:"public", table}, payload => {
        applyChange(table, payload.eventType, payload.new, payload.old);
        S.data = buildData();
        if (!S.loading) mount();
      })
      .subscribe(status => {
        if (status === "SUBSCRIBED") {
          subCount++;
          if (subCount >= tables.length) { RT_STATUS = "live"; if(S.me) mount(); }
        } else if (status === "CHANNEL_ERROR" || status === "TIMED_OUT") {
          RT_STATUS = "error"; if(S.me) mount();
        }
      });
  });
}

    `,`<button class="btn btn-s" data-action="close-modal">বাতিল</button><button class="btn btn-p" data-action="payment-preview">পর্যালোচনা →</button>`);

  return `<div class="pi">

function renderSpending() {
  const {users, payments, spending, mods, modBudgets} = S.data;

  const totalInHand    = totalAllocated - totalSpent;
  const unallocated    = totalCol - totalAllocated;

  // ── Banner ────────────────────────────────────────────────────────────────

          <div style="font-size:.63rem;font-weight:800;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px">💰 বরাদ্দযোগ্য তহবিল</div>

      </div>
      <div style="background:#fff;display:flex;border-top:1px solid var(--border)">

          <div style="font-weight:800;font-size:.94rem;color:var(--rose)">৳${totalSpent.toLocaleString()}</div>
        </div>
        <div style="flex:1;padding:10px 12px">
          <div style="font-size:.59rem;font-weight:800;color:var(--muted);text-transform:uppercase;margin-bottom:3px">মডারেটরের হাতে আছে</div>
          <div style="font-weight:800;font-size:.94rem;color:${totalInHand<0?"var(--rose)":"var(--sky)"}">৳${totalInHand.toLocaleString()}</div>
        </div>
      </div>
    </div>`;

  // ── Per-moderator sections ────────────────────────────────────────────────
  const allModIds = [...new Set([
    ...(mods.spending||[]),
    ...spending.map(c=>c.moderatorId)
  ])].filter(Boolean);
  // All members can VIEW spending; only admin/spendMod can manage

    const myBudget = modBudgets[modId]||0;
    const myRemain = myBudget - mySpent;
    const pct = myBudget>0 ? Math.min(100,Math.round((mySpent/myBudget)*100)) : (mySpent>0?100:0);
    const isMe = modId===S.me.id;

    return `<div style="background:#fff;border:1.5px solid ${myRemain<0?"var(--rose)":isMe?"var(--saffron)":"var(--border)"};border-radius:14px;overflow:hidden;margin-bottom:12px">

          ${av(mod,42)}

          <div style="display:flex;justify-content:space-between;font-size:.74rem;font-weight:700;margin-bottom:5px">
            <span style="color:var(--forest)">বরাদ্দ: ৳${myBudget.toLocaleString()}</span>
            <span style="color:var(--rose)">খরচ: ৳${mySpent.toLocaleString()}</span>
          </div>
          <div style="height:6px;background:#EAE2D8;border-radius:3px;overflow:hidden">
            <div style="height:100%;border-radius:3px;background:${myRemain<0?"var(--rose)":"var(--saffron)"};width:${pct}%"></div>

            </div>
            ${myRemain>0?(isAdmin||isMe)?`<button class="btn btn-f btn-sm" style="flex-shrink:0" data-action="open-modal" data-modal="handover-mod" data-mod-id="${modId}" data-remain="${myRemain}">↩ তহবিলে ফেরত</button>`:"":""}
          </div>
        </div>
      </div>
      <div style="padding:10px 14px">

function renderSleep() {
  const {users, rooms, mods} = S.data;
  const canEdit = S.me.role==="super_admin"||(mods.sleep||[]).includes(S.me.id);
  const totalSlots = rooms.reduce((s,r)=>s+r.capacity,0);
  const occ = rooms.reduce((s,r)=>s+r.slots.filter(sl=>sl.status==="occ").length,0);
  const unassigned = users.filter(u=>!rooms.some(r=>r.slots.some(s=>s.occupantId===u.id)));
  const {modal:m, form:f} = S;
  const roomRows = rooms.map(room=>`<div class="sleep-c">
    <div class="sleep-h"><h3>${esc(room.name)}</h3><div style="font-size:.7rem;color:var(--muted);margin-top:2px">${room.slots.filter(s=>s.status==="occ").length}/${room.capacity} দখলকৃত · ${room.beds} বিছানা</div></div>
    <div class="sleep-slots">${room.slots.map(slot=>{
      const ocu=slot.occupantId?users.find(u=>u.id===slot.occupantId):null;
      return `<div class="sl ${slot.status}">
        <span class="sl-name">${ocu?`🧑 ${esc(ocu.name)}`:`স্থান ${slot.id}`}</span>
        <div style="display:flex;align-items:center;gap:5px">
          <span class="sl-st">${slot.status==="occ"?"দখলকৃত":"খালি"}</span>
          ${canEdit&&slot.status==="avail"?`<button class="btn btn-f btn-xs" data-action="open-modal" data-modal="assign-room" data-room-id="${room.id}" data-slot-id="${slot.id}">নির্ধারণ</button>`:""}
          ${canEdit&&slot.status==="occ"?`<button class="btn btn-d btn-xs" data-action="unassign-slot" data-room-id="${room.id}" data-slot-id="${slot.id}">সরান</button>`:""}
        </div>
      </div>`;
    }).join("")}</div>
  </div>`).join("");
  let modalHtml="";
  if(m==="add-room"){modalHtml=modal("রুম যোগ",`<div class="fg"><label>রুমের নাম</label><input class="fc" id="f-roomName" value="${esc(f.roomName||"")}"/></div><div class="fr2"><div class="fg"><label>ধারণক্ষমতা</label><input class="fc" id="f-capacity" type="number" value="${esc(f.capacity||"")}"/></div><div class="fg"><label>বিছানা</label><input class="fc" id="f-beds" type="number" value="${esc(f.beds||"")}"/></div></div>`,`<button class="btn btn-s" data-action="close-modal">বাতিল</button><button class="btn btn-p" data-action="save-room">রুম যোগ করুন</button>`);}
  else if(m==="assign-room"){
    const avail=users.filter(u=>!rooms.some(r=>r.slots.some(s=>s.occupantId===u.id)));
    modalHtml=modal("স্থান নির্ধারণ",`<div class="fg"><label>সদস্য নির্বাচন</label><select class="fc" id="f-assignUid"><option value="">— বাছুন —</option>${avail.map(u=>`<option value="${u.id}">${esc(u.name)}</option>`).join("")}</select></div>`,`<button class="btn btn-s" data-action="close-modal">বাতিল</button><button class="btn btn-f" data-action="save-assign">নির্ধারণ করুন</button>`);
  }
  return `<div class="pi">${pmb("sleep")}
    <div class="sr3"><div class="chip cf"><div class="chip-val">${totalSlots}</div><div class="chip-lbl">মোট</div></div><div class="chip cr"><div class="chip-val">${occ}</div><div class="chip-lbl">দখলকৃত</div></div><div class="chip cs"><div class="chip-val">${totalSlots-occ}</div><div class="chip-lbl">খালি</div></div></div>
    <div class="sh-row"><div class="st">ঘুমের ব্যবস্থা</div>${canEdit?`<button class="btn btn-p btn-sm" data-action="open-modal" data-modal="add-room">+ রুম</button>`:""}</div>
    ${roomRows}
    ${unassigned.length>0?`<div class="st" style="color:var(--rose)">⚠️ নির্ধারিত হয়নি</div><div style="display:flex;flex-wrap:wrap;gap:8px">${unassigned.map(u=>`<div style="background:#fff;border:1px solid var(--border);border-radius:8px;padding:7px 11px;display:flex;align-items:center;gap:8px;font-size:.82rem">${av(u,24)} ${esc(u.name)}</div>`).join("")}</div>`:""}
    ${modalHtml}
  </div>`;
}

function mount() {
  const app = document.getElementById("app");
  if (!S.me) { app.innerHTML = renderAuth(); return; }
  if (!S.data) { app.innerHTML = `<div class="loading-screen"><div class="spin"></div><span>লোড হচ্ছে...</span></div>`; return; }
  const pageMap = {dashboard:renderDashboard,fund:renderFund,spending:renderSpending,events:renderEvents,food:renderFood,sleep:renderSleep,contact:renderContact,volunteer:renderVolunteer,users:renderUsers,permissions:renderPermissions};
  const moreIds = MORE.map(p=>p.id);
  const activeTab = moreIds.includes(S.page) ? "more" : S.page;
  const renderer = pageMap[S.page];
  app.innerHTML = `
    ${S.loading?`<div class="loadbar"></div>`:""}
    <div class="app">
      ${renderTopbar()}
      <div class="page">${renderer ? renderer() : ""}</div>
      ${S.page!=="users"?`<button class="fab" data-action="nav-users-family">👨‍👩‍👧</button>`:""}
      ${renderNav()}
      ${S.sheet==="more" ? renderMoreSheet() : ""}
      ${S.sheet==="user" ? renderUserSheet() : ""}
    </div>
  `;
}

// ── EVENTS ───────────────────────────────────────────────────────────────────
document.addEventListener("click", async function(e) {
  const el = e.target.closest("[data-action]");
  if (!el) return;
  const a = el.dataset.action;
  const d = el.dataset;

  if (a === "auth-tab") { S.authTab = d.tab; S.authErr = ""; S.authStep = "phone"; mount(); return; }
  if (a === "auth-back") { S.authStep = "phone"; S.authErr = ""; mount(); return; }

  if (a === "auth-login") {
    const phone = document.getElementById("auth-phone")?.value?.trim();
    const {data,error} = await sb.from("members").select("*").eq("phone",phone).single();
    if (!data) { S.authErr = "এই নম্বরে অ্যাকাউন্ট নেই।"; mount(); return; }
    const u = {id:data.id,name:data.name,phone:data.phone,type:data.type,role:data.role,noPhone:data.no_phone,guardianId:data.guardian_id,note:data.note||"",password:data.password||""};
    if ((u.role==="super_admin"||u.role==="moderator") && u.password) { S.authPending=u; S.authStep="password"; S.authErr=""; mount(); return; }
    S.me = u; S.authErr = ""; localStorage.setItem("poribar_me", JSON.stringify(u)); await reload(); setupRealtime(); return;
  }
  if (a === "auth-pw") {
    const pw = document.getElementById("auth-pw")?.value;
    if (S.authPending.password === pw) { S.me = S.authPending; S.authErr = ""; localStorage.setItem("poribar_me", JSON.stringify(S.authPending)); await reload(); setupRealtime(); }
    else { S.authErr = "পাসওয়ার্ড সঠিক নয়।"; mount(); }
    return;
  }
  if (a === "auth-register") {
    const name = document.getElementById("auth-name")?.value?.trim();
    const phone = document.getElementById("auth-regphone")?.value?.trim();
    if (!name || !phone) { S.authErr = "নাম ও ফোন দিন।"; mount(); return; }
    const {data:ex} = await sb.from("members").select("id").eq("phone",phone).single();
    if (ex) { S.authErr = "এই নম্বরে ইতিমধ্যে অ্যাকাউন্ট আছে।"; mount(); return; }
    const {data,error} = await sb.from("members").insert({name,phone,type:"adult",role:"general",no_phone:false,note:"",password:""}).select().single();
    if (error) { S.authErr = "ত্রুটি হয়েছে।"; mount(); return; }
    S.me = {id:data.id,name:data.name,phone:data.phone,type:data.type,role:data.role,noPhone:false,guardianId:null,note:"",password:""};
    localStorage.setItem("poribar_me", JSON.stringify(S.me));
    await reload(); setupRealtime(); return;
  }

  if (a === "logout") { S.me=null; S.data=null; S.sheet=null; localStorage.removeItem("poribar_me"); mount(); return; }
  if (a === "nav") {
    const p = d.page;
    if (p === "more") { S.sheet = S.sheet==="more" ? null : "more"; mount(); return; }
    S.page = p; S.sheet = null; S.modal = null; S.form = {}; mount(); return;
  }
  if (a === "nav-users-family") { S.page="users"; S.sheet=null; S.modal="add-family"; S.form={}; mount(); return; }
  if (a === "toggle-user-sheet") { S.sheet = S.sheet==="user" ? null : "user"; mount(); return; }
  if (a === "close-sheet") { S.sheet = null; mount(); return; }
  if (a === "close-modal") { S.modal = null; S.form = {}; S.confirm = null; mount(); return; }
  if (a === "close-modal-bg") { if(e.target===el){S.modal=null;S.form={};S.confirm=null;mount();} return; }
  if (a === "dismiss-notice") { S.noticeDismissed = true; mount(); return; }
  if (a === "fund-tab") { S.fundTab = d.tab; mount(); return; }

  // PMB: show inline add-moderator row (must be BEFORE generic open-modal)
  if (a === "show-pmb-add") {
    const el2 = document.getElementById(`pmb-add-${d.modKey}`);
    if (el2) { el2.style.display = "flex"; el2.previousElementSibling?.querySelector("button[data-action=show-pmb-add]")?.remove(); }
    return;
  }
  if (a === "close-pmb-add") { const el2=document.getElementById(`pmb-add-${d.modKey}`); if(el2)el2.style.display="none"; return; }

  if (a === "open-modal") {
    const m = d.modal;
    S.modal = m; S.form = {};
    if (m==="payment-form") {
      if (d.payId) { const pay=S.data.payments.find(p=>p.id===Number(d.payId)); S.form={_editPayId:Number(d.payId),userId:pay.userId,entryFee:pay.entryFee,donation:pay.donation,channel:pay.channel,note:pay.note}; }
      else if (d.userId) { S.form={userId:Number(d.userId),entryFee:d.entryFee||"",donation:"0",channel:"নগদ (হাতে)",note:""}; }
      else { S.form={userId:"",entryFee:"",donation:"0",channel:"নগদ (হাতে)",note:""}; }
    }
    else if (m==="add-item"||m==="edit-item") { S.form={_catId:Number(d.catId),_itemId:d.itemId?Number(d.itemId):null}; if(m==="edit-item"){const cat=S.data.spending.find(c=>c.id===Number(d.catId));const item=cat?.items.find(i=>i.id===Number(d.itemId));if(item){S.form.itemName=item.name;S.form.itemAmt=item.amount;}} }
    else if (m==="handover") { S.form={_catId:Number(d.catId),handoverAmt:d.rem}; }
    else if (m==="allocate-fund") { S.form={_catId:d.catId||"",allocAmt:"",allocNote:""}; }
    else if (m==="alloc-mod") { S.form={_modId:d.modId||"",allocAmt:""}; }
    else if (m==="add-cat") { S.form={_modId:d.modId||"",category:""}; }
    else if (m==="handover-mod") { S.form={_modId:d.modId||"",_remain:d.remain||0}; }
    else if (m==="edit-event") { const ev=S.data.events.flatMap(dx=>dx.items).find(i=>i.id===Number(d.eventId)); S.form={_eventId:Number(d.eventId),_dayId:Number(d.dayId),evTime:ev?.time,evTitle:ev?.title,evDesc:ev?.desc}; }
    else if (m==="add-event") { S.form={}; }
    else if (m==="edit-food") { S.form={_foodId:Number(d.foodId),_dayId:Number(d.dayId),_meal:d.meal,foodName:""}; const day=S.data.food.find(fd=>fd.id===Number(d.dayId)); const item=(day?.[d.meal]||[]).find(i=>i.id===Number(d.foodId)); if(item)S.form.foodName=item.item_name; }
    else if (m==="add-food") { S.form={_dayId:Number(d.dayId),_meal:d.meal,foodName:""}; }
    else if (m==="add-food-day") { S.form={foodDate:"",foodDayLabel:""}; }
    else if (m==="assign-room") { S.form={_roomId:Number(d.roomId),_slotId:Number(d.slotId)}; }
    else if (m==="edit-member") { S.form={_editUserId:Number(d.uid)}; }
    else if (m==="add-perm") { S.form={permUid:d.uid||"",permMod:""}; }
    else if (m==="change-pw") { const u=d.uid?S.data.users.find(x=>x.id===Number(d.uid)):null; S.form={pwUid:d.uid||"",newPw:u?.password||""}; }
    mount(); return;
  }
  if (a === "save-mod") {
    const key = d.modKey;
    const sel = document.getElementById(`pmb-sel-${key}`);
    const uid = Number(sel?.value); if (!uid) return;
    await sb.from("module_moderators").upsert({module:key,member_id:uid});
    await sb.from("members").update({role:"moderator"}).eq("id",uid);
    await reloadTables("module_moderators","members"); return;
  }
  if (a === "remove-mod") {
    await sb.from("module_moderators").delete().eq("module",d.modKey).eq("member_id",Number(d.uid));
    await reloadTables("module_moderators"); return;
  }

  // Dashboard
  if (a === "delete-notice") { await sb.from("app_settings").upsert({key:"notice",value:""}); S.noticeDismissed=false; await reloadTables("app_settings"); return; }
  if (a === "save-notice") { const txt=document.getElementById("notice-txt")?.value||""; await sb.from("app_settings").upsert({key:"notice",value:txt}); S.modal=null; await reloadTables("app_settings"); return; }

  // Fund
  if (a === "payment-preview") {
    const userId = Number(document.getElementById("f-userId")?.value || S.form.userId);
    const entryFee = Number(document.getElementById("f-entryFee")?.value);
    const donation = Number(document.getElementById("f-donation")?.value)||0;
    const channel = document.getElementById("f-channel")?.value || "নগদ (হাতে)";
    const note = document.getElementById("f-note")?.value || "";
    if (!userId || !entryFee) return;
    const u = S.data.users.find(x=>x.id===userId);
    S.confirm = {userId,userName:u?.name,entryFee,donation,channel,note,_editPayId:S.form._editPayId};
    S.modal = "payment-confirm"; mount(); return;
  }
  if (a === "payment-back") { S.modal="payment-form"; mount(); return; }
  if (a === "payment-save") {
    const c = S.confirm;
    if (c._editPayId) await sb.from("payments").update({entry_fee:c.entryFee,donation:c.donation,channel:c.channel,note:c.note}).eq("id",c._editPayId);
    else await sb.from("payments").insert({member_id:c.userId,entry_fee:c.entryFee,donation:c.donation,channel:c.channel,note:c.note});
    S.modal=null; S.confirm=null; S.form={}; await reloadTables("payments"); return;
  }

  // Spending
  if (a === "save-alloc-mod") {
    const modId = Number(document.getElementById("f-allocModId")?.value);
    const amt   = Number(document.getElementById("f-allocAmt")?.value)||0;
    if (!modId || amt <= 0) { alert("মডারেটর ও পরিমাণ দিন।"); return; }
    const cur = S.data.modBudgets[modId]||0;
    await sb.from("app_settings").upsert({key:`mod_budget_${modId}`, value:String(cur+amt)});
    S.modal=null; S.form={}; await reloadTables("app_settings"); return;
  }
  if (a === "save-handover-mod") {
    const modId = Number(S.form._modId);
    const amt   = Number(document.getElementById("f-handoverModAmt")?.value)||0;
    if (!modId || amt <= 0) { alert("পরিমাণ দিন।"); return; }
    const cur = S.data.modBudgets[modId]||0;
    const newBudget = Math.max(0, cur - amt);
    await sb.from("app_settings").upsert({key:`mod_budget_${modId}`, value:String(newBudget)});
    S.modal=null; S.form={}; await reloadTables("app_settings"); return;
  }
  if (a === "save-cat") {
    const catName = document.getElementById("f-category")?.value?.trim();
    if (!catName) return;
    const modId = Number(document.getElementById("f-catModId")?.value)||S.me.id;
    await sb.from("spending_categories").insert({category:catName, moderator_id:modId, received:0, handovers_back:0});
    S.modal=null; await reloadTables("spending_categories"); return;
  }
  if (a === "save-spending-item") {
    const name=document.getElementById("f-itemName")?.value;
    const amount=Number(document.getElementById("f-itemAmt")?.value)||0;
    if(S.form._itemId) await sb.from("spending_items").update({name,amount}).eq("id",S.form._itemId);
    else await sb.from("spending_items").insert({category_id:S.form._catId,name,amount});
    S.modal=null; await reloadTables("spending_items"); return;
  }
  if (a === "del-spending-item") { await sb.from("spending_items").delete().eq("id",Number(d.itemId)); await reloadTables("spending_items"); return; }
  if (a === "save-handover") {
    const amt=Number(document.getElementById("f-handoverAmt")?.value)||0;
    const cat=S.data.spending.find(c=>c.id===S.form._catId);
    await sb.from("spending_categories").update({handovers_back:cat.handoversBack+amt}).eq("id",S.form._catId);
    S.modal=null; await reloadTables("spending_categories"); return;
  }

  // Events
  if (a === "save-event") {
    const time=document.getElementById("f-evTime")?.value;
    const title=document.getElementById("f-evTitle")?.value;
    const desc=document.getElementById("f-evDesc")?.value||"";
    if(!title||!time) return;
    if(S.form._eventId){
      await sb.from("event_items").update({time_label:time,title,description:desc}).eq("id",S.form._eventId);
    } else {
      const date=document.getElementById("f-evDate")?.value;
      const dayLabel=document.getElementById("f-evDayLabel")?.value||"নতুন দিন";
      if(!date) return;
      let dayId; const ex=S.data.events.find(ev=>ev.date===date);
      if(ex){dayId=ex.id;}else{const {data:nd}=await sb.from("event_days").insert({date,day_label:dayLabel,sort_order:S.data.events.length+1}).select().single();dayId=nd.id;}
      await sb.from("event_items").insert({event_day_id:dayId,time_label:time,title,description:desc,sort_order:99});
    }
    S.modal=null; await reloadTables("event_days","event_items"); return;
  }
  if (a === "del-event") { await sb.from("event_items").delete().eq("id",Number(d.eventId)); await reloadTables("event_items"); return; }
  if (a === "del-event-day") {
    const dayId = Number(d.dayId);
    await sb.from("event_items").delete().eq("event_day_id", dayId);
    await sb.from("event_days").delete().eq("id", dayId);
    await reloadTables("event_days","event_items"); return;
  }

  // Food
  if (a === "save-food-day") {
    const date=document.getElementById("f-foodDate")?.value;
    const dayLabel=document.getElementById("f-foodDayLabel")?.value||"নতুন দিন";
    if(!date){return;}
    await sb.from("food_days").insert({date,day_label:dayLabel,sort_order:S.data.food.length+1});
    S.modal=null; await reloadTables("food_days"); return;
  }
  if (a === "del-food-day") {
    const dayId=Number(d.dayId);
    await sb.from("food_items").delete().eq("food_day_id",dayId);
    await sb.from("food_days").delete().eq("id",dayId);
    await reloadTables("food_days","food_items"); return;
  }
  if (a === "save-food") {
    const name=document.getElementById("f-foodName")?.value;
    if(S.form._foodId) await sb.from("food_items").update({item_name:name}).eq("id",S.form._foodId);
    else await sb.from("food_items").insert({food_day_id:S.form._dayId,meal:S.form._meal,item_name:name,sort_order:99});
    S.modal=null; await reloadTables("food_items"); return;
  }
  if (a === "del-food") { await sb.from("food_items").delete().eq("id",Number(d.foodId)); await reloadTables("food_items"); return; }

  // Sleep
  if (a === "unassign-slot") { await sb.from("room_slots").update({occupant_id:null}).eq("room_id",Number(d.roomId)).eq("slot_number",Number(d.slotId)); await reloadTables("room_slots"); return; }
  if (a === "save-room") {
    const name=document.getElementById("f-roomName")?.value;
    const cap=Number(document.getElementById("f-capacity")?.value)||2;
    const beds=Number(document.getElementById("f-beds")?.value)||1;
    const {data}=await sb.from("rooms").insert({name,capacity:cap,beds}).select().single();
    await sb.from("room_slots").insert(Array.from({length:cap},(_,i)=>({room_id:data.id,slot_number:i+1,occupant_id:null})));
    S.modal=null; await reloadTables("rooms","room_slots"); return;
  }
  if (a === "save-assign") {
    const uid=Number(document.getElementById("f-assignUid")?.value); if(!uid)return;
    await sb.from("room_slots").update({occupant_id:uid}).eq("room_id",S.form._roomId).eq("slot_number",S.form._slotId);
    S.modal=null; await reloadTables("room_slots"); return;
  }

  // Volunteer
  if (a === "save-volunteer") { await sb.from("volunteers").insert({member_id:S.me.id}); S.modal=null; await reloadTables("volunteers"); return; }
  if (a === "leave-volunteer") { await sb.from("volunteers").delete().eq("member_id",S.me.id); await reloadTables("volunteers"); return; }

  // Users
  if (a === "set-fam-type") { S.form.famType=d.type; mount(); return; }
  if (a === "save-family") {
    const name=document.getElementById("f-famName")?.value?.trim();
    const rel=document.getElementById("f-famRel")?.value;
    const type=S.form.famType;
    const phone=document.getElementById("f-famPhone")?.value?.trim()||null;
    if(!name||!rel||!type)return;
    const note=`${rel} – ${S.me.name}-এর পরিবার`;
    await sb.from("members").insert({name,phone:phone||null,type,role:"general",no_phone:!phone,guardian_id:phone?null:S.me.id,note,password:""});
    S.modal=null; S.form={}; await reloadTables("members"); return;
  }
  if (a === "save-member") {
    const name=document.getElementById("f-mName")?.value?.trim();
    const noPhone=document.getElementById("f-noPhone")?.checked;
    const phone=noPhone?null:document.getElementById("f-mPhone")?.value?.trim()||null;
    const guardianId=noPhone?Number(document.getElementById("f-guardianId")?.value)||null:null;
    const type=document.getElementById("f-mType")?.value||"adult";
    const role=document.getElementById("f-mRole")?.value||"general";
    const note=document.getElementById("f-mNote")?.value||"";
    await sb.from("members").insert({name,phone,type,role,no_phone:noPhone,guardian_id:guardianId,note,password:""});
    S.modal=null; await reloadTables("members"); return;
  }
  if (a === "save-edit-member") {
    const uid=S.form._editUserId;
    const name=document.getElementById("f-mName")?.value?.trim();
    const phone=document.getElementById("f-mPhone")?.value?.trim()||null;
    const type=document.getElementById("f-mType")?.value;
    const role=document.getElementById("f-mRole")?.value;
    const note=document.getElementById("f-mNote")?.value||"";
    await sb.from("members").update({name,phone,type,role,note}).eq("id",uid);
    S.modal=null; await reloadTables("members"); return;
  }
  if (a === "del-user") { await sb.from("members").delete().eq("id",Number(d.uid)); await reloadTables("members"); return; }

  // Permissions
  if (a === "save-perm") {
    const uid=Number(document.getElementById("f-permUid")?.value);
    const mod=document.getElementById("f-permMod")?.value;
    if(!uid||!mod)return;
    await sb.from("module_moderators").upsert({module:mod,member_id:uid});
    await sb.from("members").update({role:"moderator"}).eq("id",uid);
    S.modal=null; await reloadTables("module_moderators","members"); return;
  }
  if (a === "remove-perm") { await sb.from("module_moderators").delete().eq("module",d.mod).eq("member_id",Number(d.uid)); await reloadTables("module_moderators"); return; }
  if (a === "save-pw") {
    const uid=Number(document.getElementById("f-pwUid")?.value);
    const pw=document.getElementById("f-newPw")?.value||"";
    if(!uid)return;
    await sb.from("members").update({password:pw}).eq("id",uid);
    S.modal=null; await reloadTables("members"); return;
  }
});

// ── SERVICE WORKER (runs only on https/localhost) ─────────────────────────────
if ("serviceWorker" in navigator && (location.protocol === "https:" || location.hostname === "localhost")) {
  const swCode = `
    const CACHE = "poribar-v1";
    const PRECACHE = ["./", "./manifest.json"];
    self.addEventListener("install", e => { e.waitUntil(caches.open(CACHE).then(c => c.addAll(PRECACHE))); self.skipWaiting(); });
    self.addEventListener("activate", e => { e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k))))); self.clients.claim(); });
    self.addEventListener("fetch", e => {
      if (e.request.url.includes("supabase.co")) return;
      const hosts = ["fonts.googleapis.com","fonts.gstatic.com","cdn.jsdelivr.net"];
      if (hosts.some(h => e.request.url.includes(h))) {
        e.respondWith(caches.open(CACHE).then(async c => { const cached = await c.match(e.request); if (cached) return cached; const fresh = await fetch(e.request); c.put(e.request, fresh.clone()); return fresh; }));
        return;
      }
      e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
    });
  `;
  const swBlob = new Blob([swCode], {type:"application/javascript"});
  navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(()=>{});
}

// ── INIT ──────────────────────────────────────────────────────────────────────
try { const saved = localStorage.getItem("poribar_me"); if (saved) { S.me = JSON.parse(saved); } } catch(e) {}
if (S.me) { reload().then(setupRealtime); } else { mount(); }
</script>
